name: AI-Transformation Market Weekly Scan

on:
  schedule:
    - cron: "0 0 * * 0"             # Every Sunday 00:00 UTC — weekly assurance sweep
    - cron: "0 1 1 1,3,5,7,9,11 *"  # 1st of every other month — re-classify all + flag band shifts
    - cron: "0 2 1 * *"             # 1st of every month — find websites for unreachable ("site?") companies
  workflow_dispatch:                 # Manual trigger
    inputs:
      reclassify:
        description: "Re-classify all companies and flag band shifts (red delta)"
        type: boolean
        default: false
      find_sites:
        description: "Find official websites for unreachable ('site?') companies"
        type: boolean
        default: false

permissions:
  contents: write           # Needed to commit updated JSON files back

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      # Secrets come from Doppler (EXA_API_KEY, FIRECRAWL_API_KEY, GEMINI_API_KEY
      # live in the codos-competitive-observatory project, config prd).
      # Add a single DOPPLER_TOKEN service-token secret to the repo.
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run AI-Transformation Market scan (via Doppler)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          # RECLASSIFY=1 on the bimonthly cron or when manually toggled
          RECLASSIFY: ${{ (github.event.schedule == '0 1 1 1,3,5,7,9,11 *' || inputs.reclassify) && '1' || '0' }}
          # FIND_SITES=1 on the monthly cron or when manually toggled
          FIND_SITES: ${{ (github.event.schedule == '0 2 1 * *' || inputs.find_sites) && '1' || '0' }}
        run: doppler run -- python main.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "AI-Transformation Market Bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          git add -A data/   # snapshot + insights/scan history + ledgers + overrides
          if git diff --cached --quiet; then echo "no data changes"; exit 0; fi
          git commit -m "chore: scan $(date -u '+%Y-%m-%d %H:%M')"
          # Rebase onto anything that landed during the scan (e.g. a mid-scan add), then push — retry.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then exit 0; fi
            echo "push attempt $i failed; retrying…"; sleep 5
          done
          echo "push failed after retries"; exit 1

      # Optional: deploy refreshed data to your own server over rsync/SSH.
      # Skipped automatically unless the VPS_HOST repo variable is set.
      # Configure: Variables VPS_HOST (e.g. user@1.2.3.4) + VPS_PATH, and Secret VPS_SSH_KEY.
      - name: Deploy data to server
        if: ${{ vars.VPS_HOST != '' }}
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PATH: ${{ vars.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${VPS_HOST##*@}" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            data/ "${VPS_HOST}:${VPS_PATH}"
